name: "disclose.io Framework (dioterms)"
description: "Canonical, public-domain reference for vulnerability disclosure policy language and program maturity."
license: "CC0-1.0"
repository: "https://github.com/disclose/dioterms"
website: "https://disclose.io/framework/"
contributing: "CONTRIBUTING.md"
provenance:
  policy: "Every term file carries an HTML-comment provenance header; deep authorship history lives in git blame. Files are moved with `git mv`, never delete-and-recreate. archive/ is frozen."
  default_license: "CC0-1.0"
  exceptions: "Externally-authored documents (e.g. practices/good-faith-security-research.md) retain their own attribution and license as stated in their file header."

pillars:
  - id: terms
    name: "Legal Terms"
    description: "The four canonical policy templates (mirrored to policymaker.disclose.io) plus BBP, regional variants, and archive."
    paths:
      - terms/
      - bbp/
      - regional/
      - archive/

  - id: practices
    name: "Operational Practices"
    description: "Conduct guidance for good-faith security research. External documents retain their own attribution and license; see each file's provenance header."
    paths:
      - practices/

  - id: maturity
    name: "diostatus Maturity Model"
    description: "A six-level progression from no-program (Level 0) to full safe harbor with CVD (Level 5)."
    paths:
      - maturity/

canonical_templates:
  description: "The four term templates that mirror policymaker.disclose.io 1:1."
  locales_file: terms/languages.json
  templates:
    - id: vdp
      policymaker_template: disclose-io-vdp
      path: terms/vdp/
    - id: vdp-with-cvd
      policymaker_template: disclose-io-vdp-with-cvd
      path: terms/vdp-with-cvd/
    - id: safe-harbor
      policymaker_template: disclose-io-safe-harbor
      path: terms/safe-harbor/
    - id: simple-safe-harbor
      policymaker_template: disclose-io-simple-safe-harbor
      path: terms/simple-safe-harbor/

variables:
  organization:
    description: "The organisation's name."
    placeholder: "[Organization Name]"
  channel:
    description: "The security reporting channel (email, form URL, or platform)."
    placeholder: "[reporting channel]"
  disclosure_window:
    description: "Number of days until the coordinated-disclosure timeline expires."
    placeholder: "[number of days]"
    default: "90"
